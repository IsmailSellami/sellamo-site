<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sellamo — Menu & Panier</title>
<style>
  body { font-family:sans-serif; margin:0; background:#fafafa; }
  .container { max-width:1200px; margin:0 auto; padding:12px; }
  .header { background:#fff; padding:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); display:flex; flex-direction:column; gap:8px; }
  .header__row { display:flex; justify-content:space-between; align-items:center; }
  .brand { font-weight:bold; font-size:1.5em; }
  .input.search { padding:6px 8px; width:200px; }
  .tabs { display:flex; gap:4px; flex-wrap:wrap; }
  .tab { padding:6px 12px; border:none; cursor:pointer; background:#eee; border-radius:4px; }
  .tab.active { background:#2196f3; color:white; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .card { background:white; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; }
  .card__img { width:100%; height:100px; object-fit:cover; }
  .card__meta { padding:6px; }
  .card__title { font-weight:bold; }
  .card__price { color:#555; font-size:0.9em; }
  .card__foot { padding:6px; display:flex; flex-direction:column; gap:4px; }
  .btn { padding:6px 12px; border:none; border-radius:4px; cursor:pointer; }
  .btn--primary { background:#2196f3; color:white; }
  .btn--light { background:#eee; }
  .drawer { position:fixed; top:0; right:-400px; width:350px; height:100%; background:white; box-shadow:-2px 0 6px rgba(0,0,0,0.2); transition:0.3s; display:flex; flex-direction:column; }
  .drawer.open { right:0; }
  .drawer__head, .drawer__foot { padding:12px; border-bottom:1px solid #eee; display:flex; justify-content:space-between; align-items:center; }
  .drawer__content { flex:1; overflow:auto; padding:12px; }
  .cart-item { display:flex; gap:12px; padding:8px; border-bottom:1px solid #eee; align-items:flex-start; }
  .cart-img { width:60px; height:60px; object-fit:cover; border-radius:6px; }
  .cart-info { flex:1; display:flex; flex-direction:column; gap:4px; }
  .cart-title { font-weight:bold; }
  .cart-price { color:#555; font-size:0.9em; }
  .cart-qty { display:flex; align-items:center; gap:4px; }
  .cart-qty button { padding:2px 6px; }
  textarea.comment { width:100%; height:40px; resize:none; margin-top:4px; font-size:0.9em; }
  .remove { background:#f44336; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; }
  .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; }
  .modal.open { display:flex; }
  .modal__card { background:white; border-radius:6px; width:300px; padding:12px; display:flex; flex-direction:column; gap:12px; }
  .modal__head { font-weight:bold; }
  .modal__foot { display:flex; justify-content:space-between; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:8px 12px; border-radius:4px; opacity:0; transition:0.3s; }
  .toast.show { opacity:1; }
</style>
</head>
<body>
<header class="header container">
  <div class="header__row">
    <div class="brand">Sellamo</div>
    <input id="search" class="input search" placeholder="Rechercher... / بحث">
    <button id="openCart" class="btn btn--light">🛒 <span id="cartCount">0</span></button>
  </div>
  <nav id="categoryTabs" class="tabs"></nav>
</header>

<main class="container">
  <div id="catalog"></div>
</main>

<aside id="cartDrawer" class="drawer" aria-hidden="true">
  <div class="drawer__head">
    <strong>Votre Panier</strong>
    <button id="closeCart" class="btn btn--link">✕</button>
  </div>
  <div id="cartItems" class="drawer__content"></div>
  <div class="drawer__foot">
    <span>Total</span>
    <strong id="cartTotal">0.000 DT</strong>
    <button id="checkoutBtn" class="btn btn--primary">Confirmer</button>
  </div>
</aside>

<div id="checkoutModal" class="modal">
  <div class="modal__card">
    <div class="modal__head">Détails de la commande</div>
    <input id="tableNumber" type="number" min="1" placeholder="Numéro de table">
    <div>
      <label><input type="radio" name="pay" value="cash" checked> Espèce (كاش)</label>
      <label><input type="radio" name="pay" value="online"> En ligne</label>
    </div>
    <div class="modal__foot">
      <button id="cancelCheckout" class="btn btn--light">Annuler</button>
      <button id="confirmCheckout" class="btn btn--primary">Confirmer</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// PRODUCTS
const PRODUCTS = [
  {id:'p1',name:'Express',price:2.5,img:'assets/img/cafe/exp.avif',category:'Café'},
  {id:'p2',name:'Capucin',price:4.0,img:'assets/img/cafe/capss.jpg',category:'Café'},
  {id:'p3',name:'Direct',price:4.3,img:'assets/img/cafe/dir.jpg',category:'Café'},
  {id:'p4',name:'Glacé',price:4.5,img:'assets/img/cafe/glacé.jpg',category:'Café'},
  {id:'p5',name:'Thé Vert',price:2.8,img:'assets/img/the/tea.jpg',category:'Thé'}
];

// State
const CART_KEY = 'sellamo_cart_v1';
let cart = JSON.parse(localStorage.getItem(CART_KEY)||'[]');

// Elements
const catalogEl=document.getElementById('catalog');
const categoryTabs=document.getElementById('categoryTabs');
const searchInput=document.getElementById('search');
const cartBtn=document.getElementById('openCart');
const cartDrawer=document.getElementById('cartDrawer');
const cartItemsEl=document.getElementById('cartItems');
const cartTotalEl=document.getElementById('cartTotal');
const cartCountEl=document.getElementById('cartCount');
const closeCartBtn=document.getElementById('closeCart');
const checkoutBtn=document.getElementById('checkoutBtn');
const checkoutModal=document.getElementById('checkoutModal');
const cancelCheckout=document.getElementById('cancelCheckout');
const confirmCheckout=document.getElementById('confirmCheckout');
const tableNumberInput=document.getElementById('tableNumber');
const toastEl=document.getElementById('toast');

function saveCart(){ localStorage.setItem(CART_KEY, JSON.stringify(cart)); renderCart(); updateBadge(); }
function updateBadge(){ cartCountEl.textContent = cart.reduce((s,i)=>s+i.qty,0); }
function formatDT(v){ return v.toFixed(3)+' DT'; }
function toast(msg,ms=1700){ clearTimeout(toastEl._t); toastEl.textContent=msg; toastEl.classList.add('show'); toastEl._t=setTimeout(()=>toastEl.classList.remove('show'),ms); }

// Cart ops
function addToCart(pid){ 
  const existing = cart.find(i=>i.id===pid);
  const p = PRODUCTS.find(x=>x.id===pid);
  if(!p) return;
  if(existing) existing.qty++; else cart.push({id:p.id,name:p.name,price:p.price,img:p.img,qty:1,comment:''});
  saveCart(); toast('Ajouté au panier ✅');
}
function removeFromCart(id){ cart=cart.filter(i=>i.id!==id); saveCart(); }
function changeQty(id,delta){ const it=cart.find(i=>i.id===id); if(!it) return; it.qty=Math.max(1,it.qty+delta); saveCart(); }
function cartTotal(){ return cart.reduce((s,i)=>s+i.price*i.qty,0); }

// Render
function renderCategories(){
  const cats = Array.from(new Set(PRODUCTS.map(p=>p.category)));
  categoryTabs.innerHTML=''; categoryTabs.appendChild(createTab('Tous'));
  cats.forEach(c=>categoryTabs.appendChild(createTab(c)));
  setActiveTab('Tous');
}
function createTab(name){ 
  const b=document.createElement('button'); b.textContent=name; b.className='tab';
  b.addEventListener('click',()=>{setActiveTab(name); filterByCategory(name);});
  return b;
}
function setActiveTab(name){ Array.from(categoryTabs.children).forEach(b=>b.classList.toggle('active',b.textContent===name)); }
function filterByCategory(c){ renderCatalog((c!=='Tous')?PRODUCTS.filter(p=>p.category===c):PRODUCTS); }
function renderCatalog(list=PRODUCTS){
  if(!list||list.length===0){ catalogEl.innerHTML='<div>Aucun produit trouvé.</div>'; return; }
  const groups={}; list.forEach(p=>{ if(!groups[p.category]) groups[p.category]=[]; groups[p.category].push(p); });
  catalogEl.innerHTML=Object.keys(groups).map(cat=>{
    const cards=groups[cat].map(p=>`
      <article class="card">
        <img class="card__img" src="${p.img}" alt="${p.name}">
        <div class="card__meta">
          <div class="card__title">${p.name}</div>
          <div class="card__price">${formatDT(p.price)}</div>
        </div>
        <div class="card__foot">
          <textarea class="comment" placeholder="Votre commentaire...">${p.comment||''}</textarea>
          <button class="btn btn--primary add-btn" data-id="${p.id}">Ajouter au panier</button>
        </div>
      </article>`).join('');
    return `<section><h2>${cat}</h2><div class="grid">${cards}</div></section>`;
  }).join('');
  document.querySelectorAll('.add-btn').forEach(b=>b.addEventListener('click',e=>addToCart(e.currentTarget.dataset.id)));
}

// Cart UI
function renderCart(){
  if(!cartItemsEl) return;
  if(cart.length===0){ cartItemsEl.innerHTML='<div>Panier vide.</div>'; }
  else {
    cartItemsEl.innerHTML = cart.map(i=>`
      <div class="cart-item" data-id="${i.id}">
        <img src="${i.img}" class="cart-img" alt="${i.name}">
        <div class="cart-info">
          <div class="cart-title">${i.name}</div>
          <div class="cart-price">${formatDT(i.price)}</div>
          <div class="cart-qty">
            <button data-act="dec" data-id="${i.id}">−</button>
            <span>${i.qty}</span>
            <button data-act="inc" data-id="${i.id}">+</button>
          </div>
          <textarea class="comment">${i.comment||''}</textarea>
        </div>
        <button class="remove" data-act="rm" data-id="${i.id}">Supprimer</button>
      </div>`).join('');
    cartItemsEl.querySelectorAll('button').forEach(b=>{
      const id=b.dataset.id, act=b.dataset.act;
      b.addEventListener('click',()=>{ if(act==='inc') changeQty(id,+1); else if(act==='dec') changeQty(id,-1); else if(act==='rm') removeFromCart(id); });
    });
  }
  cartTotalEl.textContent = formatDT(cartTotal());
  updateBadge();
}

// Drawer
cartBtn.addEventListener('click',()=>{ cartDrawer.classList.toggle('open'); cartDrawer.setAttribute('aria-hidden',!cartDrawer.classList.contains('open')); renderCart(); });
closeCartBtn.addEventListener('click',()=>{ cartDrawer.classList.remove('open'); cartDrawer.setAttribute('aria-hidden',true); });

// Search
searchInput.addEventListener('input',e=>{ const q=e.target.value.toLowerCase().trim(); renderCatalog(q?PRODUCTS.filter(p=>p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q)):PRODUCTS); });

// Checkout
checkoutBtn.addEventListener('click',()=>{ if(cart.length===0){ toast('Panier vide'); return; } checkoutModal.classList.add('open'); tableNumberInput.focus(); });
cancelCheckout.addEventListener('click',()=>checkoutModal.classList.remove('open'));
confirmCheckout.addEventListener('click',()=>{
  const t = parseInt(tableNumberInput.value,10);
  if(!t||t<1){ toast('أدخل رقم الطاولة صحيح'); return; }
  const method=document.querySelector('input[name="pay"]:checked').value;
  // update comments
  cart.forEach(item=>{ const el=document.querySelector(`.cart-item[data-id="${item.id}"] .comment`); if(el) item.comment=el.value.trim(); });
  if(method==='cash'){
    console.log('Envoyé à Firebase (cash)',cart); toast('Commande envoyée ✅'); cart=[]; saveCart(); checkoutModal.classList.remove('open'); cartDrawer.classList.remove('open');
  } else if(method==='online'){
    const amount = cartTotal();
    window.location.href=`https://pay.d17.tn/checkout?amount=${amount}`;
  }
});

// Init
renderCategories();
renderCatalog();
renderCart();
updateBadge();
</script>
</body>
</html>

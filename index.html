<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sellamo — Menu & Panier</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="container header__row">
      <div class="brand">Sellamo</div>
      <div class="controls">
        <input id="search" class="input search" placeholder="Rechercher... / بحث" />
      </div>
      <button id="openCart" class="btn btn--light">
        🛒 <span id="cartCount" class="badge">0</span>
      </button>
    </div>
    <nav id="categoryTabs" class="tabs"></nav>
  </header>

  <main class="container">
    <div id="catalog"></div>
  </main>

  <!-- Drawer Panier -->
  <aside id="cartDrawer" class="drawer" aria-hidden="true">
    <div class="drawer__head">
      <strong>Votre Panier</strong>
      <button id="closeCart" class="btn btn--link">✕</button>
    </div>
    <div id="cartItems" class="drawer__content"></div>
    <div class="drawer__foot">
      <div class="row">
        <span>Total</span>
        <strong id="cartTotal">0.00 DT</strong>
      </div>
      <button id="checkoutBtn" class="btn btn--primary">Demander</button>
    </div>
  </aside>

  <!-- Modal Demande -->
  <div id="checkoutModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="checkoutTitle">
    <div class="modal__card">
      <div class="modal__head">
        <strong id="checkoutTitle">Détails de la commande</strong>
      </div>
      <div class="modal__body">
        <label for="tableNumber" class="label">Numéro de table (رقم الطاولة)</label>
        <input id="tableNumber" class="input" type="number" min="1" placeholder="Ex: 12">

        <div class="group">
          <label class="label">Méthode de paiement</label>
          <label class="radio"><input type="radio" name="pay" value="cash" checked> Espèce (كاش)</label>
          <label class="radio"><input type="radio" name="pay" value="online"> En ligne</label>
        </div>
      </div>

      <div class="modal__foot">
        <button id="cancelCheckout" class="btn btn--light">Annuler</button>
        <button id="confirmCheckout" class="btn btn--primary">Confirmer</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
